name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run check:commands
      - run: npm run check:generated
      - run: npm run check:rules
      - run: npm test
      - run: npm run build -- --target all
      - run: npm pack --dry-run --json
